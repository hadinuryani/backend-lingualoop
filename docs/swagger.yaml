basePath: /api/v1
definitions:
  academic_year.AcademicYearRequest:
    properties:
      end_date:
        type: string
      semester_ganjil_assessment:
        type: string
      semester_ganjil_kbm:
        type: string
      semester_ganjil_start:
        type: string
      semester_genap_assessment:
        type: string
      semester_genap_kbm:
        type: string
      semester_genap_start:
        type: string
      start_date:
        type: string
      year:
        type: string
    required:
    - end_date
    - start_date
    - year
    type: object
  academic_year.AcademicYearResponse:
    properties:
      created_at:
        type: string
      end_date:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      semester:
        description: '"GANJIL", "GENAP", atau "-"'
        type: string
      semester_ganjil:
        $ref: '#/definitions/academic_year.SemesterData'
      semester_genap:
        $ref: '#/definitions/academic_year.SemesterData'
      start_date:
        type: string
      status:
        type: string
      updated_at:
        type: string
      year:
        type: string
    type: object
  academic_year.CloseSemesterRequest:
    properties:
      semester:
        description: ganjil atau genap
        enum:
        - ganjil
        - genap
        type: string
    required:
    - semester
    type: object
  academic_year.SemesterData:
    properties:
      end_assessment:
        type: string
      end_kbm:
        type: string
      start_date:
        type: string
      status:
        type: string
    type: object
  academic_year.SemesterStatusRequest:
    properties:
      semester:
        description: ganjil atau genap
        enum:
        - ganjil
        - genap
        type: string
      status:
        type: string
    required:
    - semester
    - status
    type: object
  academic_year.TemplateData:
    properties:
      end_date:
        type: string
      semester_ganjil_assessment:
        type: string
      semester_ganjil_kbm:
        type: string
      semester_ganjil_start:
        type: string
      semester_genap_assessment:
        type: string
      semester_genap_kbm:
        type: string
      semester_genap_start:
        type: string
      start_date:
        type: string
      year:
        type: string
    type: object
  academic_year.TemplateResponse:
    properties:
      source_year:
        type: string
      template:
        $ref: '#/definitions/academic_year.TemplateData'
    type: object
  auth.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  auth.LoginResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/auth.UserDTO'
    type: object
  auth.UserDTO:
    properties:
      avatar_url:
        type: string
      email:
        type: string
      full_name:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      role:
        type: string
      username:
        type: string
    type: object
  class.ClassBatchRequest:
    properties:
      academic_year_id:
        type: string
      capacity:
        type: integer
      count:
        minimum: 1
        type: integer
      grade_levels:
        items:
          type: integer
        minItems: 1
        type: array
      major_code:
        description: 'Untuk digabung dalam nama, ex: IPA'
        type: string
      major_id:
        type: string
    required:
    - academic_year_id
    - count
    - grade_levels
    - major_code
    - major_id
    type: object
  class.ClassRequest:
    properties:
      academic_year_id:
        type: string
      capacity:
        type: integer
      class_name:
        description: Otomatis dibentuk backend, tapi field dipertahankan jika frontend
          masih mengirim
        type: string
      class_number:
        minimum: 1
        type: integer
      classroom:
        type: string
      grade_level:
        minimum: 1
        type: integer
      homeroom_teacher_id:
        type: string
      level_id:
        type: string
      major_id:
        type: string
    required:
    - academic_year_id
    - class_number
    - grade_level
    - level_id
    - major_id
    type: object
  class.ClassResponse:
    properties:
      academic_year_id:
        type: string
      capacity:
        type: integer
      class_name:
        type: string
      classroom:
        type: string
      created_at:
        type: string
      homeroom_teacher_id:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      level_id:
        type: string
      major_id:
        type: string
      updated_at:
        type: string
    type: object
  class.ClassUpdateRequest:
    properties:
      capacity:
        type: integer
      homeroom_teacher_id:
        type: string
    type: object
  dashboard.Activity:
    properties:
      action:
        type: string
      colorClass:
        type: string
      details:
        type: string
      iconName:
        type: string
      id:
        type: integer
      target:
        type: string
      time:
        type: string
      user:
        type: string
    type: object
  dashboard.ChartData:
    properties:
      categories:
        items:
          type: string
        type: array
      series:
        items:
          $ref: '#/definitions/dashboard.ChartSeries'
        type: array
    type: object
  dashboard.ChartSeries:
    properties:
      data:
        items:
          type: integer
        type: array
      name:
        type: string
    type: object
  dashboard.DashboardResponse:
    properties:
      loginStatistics:
        allOf:
        - $ref: '#/definitions/dashboard.ChartData'
        description: Akan dipakai untuk Demografi Gender
      recentActivities:
        items:
          $ref: '#/definitions/dashboard.Activity'
        type: array
      shortcuts:
        items:
          $ref: '#/definitions/dashboard.Shortcut'
        type: array
      stats:
        items:
          $ref: '#/definitions/dashboard.StatCard'
        type: array
      taskStatistics:
        allOf:
        - $ref: '#/definitions/dashboard.ChartData'
        description: Akan dipakai untuk Distribusi Kelas
    type: object
  dashboard.Shortcut:
    properties:
      colorClass:
        type: string
      description:
        type: string
      iconName:
        type: string
      path:
        type: string
      title:
        type: string
    type: object
  dashboard.StatCard:
    properties:
      colorClass:
        type: string
      growth:
        type: string
      iconName:
        type: string
      title:
        type: string
      value:
        type: string
    type: object
  major.MajorRequest:
    properties:
      code:
        type: string
      description:
        type: string
      logo_file_id:
        description: Link to files.id
        type: string
      name:
        type: string
    required:
    - code
    - name
    type: object
  major.MajorResponse:
    properties:
      code:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      logo_url:
        type: string
      name:
        type: string
      updated_at:
        type: string
    type: object
  region.CityResponse:
    properties:
      id:
        type: integer
      name:
        type: string
      province_id:
        type: integer
      province_name:
        type: string
    type: object
  region.DistrictResponse:
    properties:
      city_id:
        type: integer
      city_name:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  region.PostalCodeResponse:
    properties:
      city_id:
        type: integer
      city_name:
        type: string
      district_id:
        type: integer
      district_name:
        type: string
      id:
        type: integer
      postal_code:
        type: string
      province_id:
        type: integer
      province_name:
        type: string
      subdistrict_id:
        type: integer
      subdistrict_name:
        type: string
    type: object
  region.ProvinceResponse:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  region.SubdistrictResponse:
    properties:
      district_id:
        type: integer
      district_name:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  response.DefaultResponse:
    properties:
      data: {}
      errors: {}
      message:
        type: string
      meta: {}
      success:
        type: boolean
    type: object
  student.StudentRequest:
    properties:
      address_detail:
        type: string
      address_region:
        type: string
      birth_date:
        description: YYYY-MM-DD
        type: string
      birth_place:
        type: string
      class_level:
        type: string
      full_name:
        type: string
      gender:
        enum:
        - L
        - P
        type: string
      major_id:
        type: string
      nis:
        type: string
      phone:
        type: string
      photo:
        type: string
    required:
    - class_level
    - full_name
    - gender
    - major_id
    - nis
    type: object
  student.StudentResponse:
    properties:
      address_detail:
        type: string
      address_region:
        type: string
      birth_date:
        description: YYYY-MM-DD
        type: string
      birth_place:
        type: string
      class_level:
        type: string
      created_at:
        type: string
      full_name:
        type: string
      gender:
        type: string
      id:
        type: string
      major_id:
        type: string
      nis:
        type: string
      phone:
        type: string
      photo:
        type: string
      status:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
      username:
        type: string
    type: object
  subject.SubjectRequest:
    properties:
      code:
        type: string
      description:
        type: string
      level_id:
        description: Boleh kosong
        type: string
      major_id:
        description: Boleh kosong (umum)
        type: string
      name:
        type: string
    required:
    - code
    - name
    type: object
  subject.SubjectResponse:
    properties:
      code:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      level_id:
        type: string
      major_id:
        type: string
      name:
        type: string
      updated_at:
        type: string
    type: object
  teacher.TeacherRequest:
    properties:
      address_detail:
        type: string
      address_region:
        type: string
      birth_date:
        description: YYYY-MM-DD
        type: string
      birth_place:
        type: string
      full_name:
        type: string
      gender:
        enum:
        - L
        - P
        type: string
      nip:
        type: string
      phone:
        type: string
    required:
    - full_name
    - gender
    - nip
    type: object
  teacher.TeacherResponse:
    properties:
      address_detail:
        type: string
      address_region:
        type: string
      birth_date:
        description: YYYY-MM-DD
        type: string
      birth_place:
        type: string
      created_at:
        type: string
      full_name:
        type: string
      gender:
        type: string
      id:
        type: string
      nip:
        type: string
      phone:
        type: string
      photo:
        type: string
      status:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
      username:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API Documentation for LinguaLoop E-Learning Platform.
  title: LinguaLoop API
  version: "1.0"
paths:
  /academic-years:
    get:
      description: Get a list of all academic years including nested semester data
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.DefaultResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/academic_year.AcademicYearResponse'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.DefaultResponse'
      security:
      - BearerAuth: []
      summary: Get all academic years
      tags:
      - Academic Years
    post:
      consumes:
      - application/json
      description: Add a new academic year to the system
      parameters:
      - description: Academic Year Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/academic_year.AcademicYearRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.DefaultResponse'
            - properties:
                data:
                  $ref: '#/definitions/academic_year.AcademicYearResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.DefaultResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.DefaultResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.DefaultResponse'
      security:
      - BearerAuth: []
      summary: Create new academic year
      tags:
      - Academic Years
  /academic-years/{id}:
    delete:
      description: Soft delete an academic year by ID. Fails if the year is active.
      parameters:
      - description: Academic Year ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.DefaultResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.DefaultResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.DefaultResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.DefaultResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.DefaultResponse'
      security:
      - BearerAuth: []
      summary: Delete academic year
      tags:
      - Academic Years
    get:
      description: Get detailed information of an academic year by its ID
      parameters:
      - description: Academic Year ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.DefaultResponse'
            - properties:
                data:
                  $ref: '#/definitions/academic_year.AcademicYearResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.DefaultResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.DefaultResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.DefaultResponse'
      security:
      - BearerAuth: []
      summary: Get academic year by ID
      tags:
      - Academic Years
    put:
      consumes:
      - application/json
      description: Update existing academic year data
      parameters:
      - description: Academic Year ID
        in: path
        name: id
        required: true
        type: string
      - description: Academic Year Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/academic_year.AcademicYearRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.DefaultResponse'
            - properties:
                data:
                  $ref: '#/definitions/academic_year.AcademicYearResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.DefaultResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.DefaultResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.DefaultResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.DefaultResponse'
      security:
      - BearerAuth: []
      summary: Update academic year
      tags:
      - Academic Years
  /academic-years/{id}/activate:
    put:
      description: Activate an academic year and set semester ganjil to active. Fails
        if another year is already active.
      parameters:
      - description: Academic Year ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.DefaultResponse'
            - properties:
                data:
                  $ref: '#/definitions/academic_year.AcademicYearResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.DefaultResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.DefaultResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.DefaultResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.DefaultResponse'
      security:
      - BearerAuth: []
      summary: Activate academic year
      tags:
      - Academic Years
  /academic-years/{id}/close-semester:
    put:
      consumes:
      - application/json
      description: Close a semester (if ganjil -> unlocks genap, if genap -> changes
        year status to Menunggu Kenaikan)
      parameters:
      - description: Academic Year ID
        in: path
        name: id
        required: true
        type: string
      - description: Close Semester Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/academic_year.CloseSemesterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.DefaultResponse'
            - properties:
                data:
                  $ref: '#/definitions/academic_year.AcademicYearResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.DefaultResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.DefaultResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.DefaultResponse'
      security:
      - BearerAuth: []
      summary: Close semester
      tags:
      - Academic Years
  /academic-years/{id}/semester-status:
    put:
      consumes:
      - application/json
      description: Change the status of ganjil or genap semester
      parameters:
      - description: Academic Year ID
        in: path
        name: id
        required: true
        type: string
      - description: Semester Status Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/academic_year.SemesterStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.DefaultResponse'
            - properties:
                data:
                  $ref: '#/definitions/academic_year.AcademicYearResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.DefaultResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.DefaultResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.DefaultResponse'
      security:
      - BearerAuth: []
      summary: Update semester status
      tags:
      - Academic Years
  /academic-years/template:
    get:
      description: Generate a template for the next academic year with dates shifted
        by +1 year. Fails if a draft already exists.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.DefaultResponse'
            - properties:
                data:
                  $ref: '#/definitions/academic_year.TemplateResponse'
              type: object
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.DefaultResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.DefaultResponse'
      security:
      - BearerAuth: []
      summary: Get academic year template
      tags:
      - Academic Years
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user with email and password to get JWT token
      parameters:
      - description: Login Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.DefaultResponse'
            - properties:
                data:
                  $ref: '#/definitions/auth.LoginResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.DefaultResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.DefaultResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.DefaultResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.DefaultResponse'
      summary: User Login
      tags:
      - Auth
  /classes:
    get:
      description: Get a list of all classes
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.DefaultResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/class.ClassResponse'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.DefaultResponse'
      security:
      - BearerAuth: []
      summary: Get all classes
      tags:
      - Classes
    post:
      consumes:
      - application/json
      description: Add a single new class to the system
      parameters:
      - description: Class Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/class.ClassRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.DefaultResponse'
            - properties:
                data:
                  $ref: '#/definitions/class.ClassResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.DefaultResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.DefaultResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.DefaultResponse'
      security:
      - BearerAuth: []
      summary: Create new class
      tags:
      - Classes
  /classes/{id}:
    delete:
      description: Soft delete a class by ID
      parameters:
      - description: Class ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.DefaultResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.DefaultResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.DefaultResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.DefaultResponse'
      security:
      - BearerAuth: []
      summary: Delete class
      tags:
      - Classes
    get:
      description: Get detailed information of a class by its ID
      parameters:
      - description: Class ID
        in: path
        name: id
        required: true
        type: string
      produces:
